# Shared secret — must match the inotify-watcher config.
# Set to an empty string "" to disable auth (not recommended).
shared_secret: "change-me-to-a-long-random-string"

# Each key maps a group name (from the NAS watcher) to a list of handlers.
# All handlers in a group are executed in order when the group is triggered.
handlers:

  immich:
    - type: immich_scan
      url: "http://192.168.50.200:2283"
      api_key: "YOUR_NEW_API_KEY_HERE"
      # Omit library_id to scan ALL external libraries, or specify one:
      # library_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      refresh_modified: true   # only re-process files whose mtime changed
      refresh_all_files: false # set true for a full forced rescan

  # ── Movies → Plex ───────────────────────────────────────────────────────────
  # movies:
  #   - type: plex_refresh
